server:
  port: 8081

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/identity_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# ── JWT ────────────────────────────────────────────────────────────────────
jwt:
  # RSA key files are generated at startup when they do not exist on disk;
  # in production mount them as Kubernetes secrets / Docker secrets.
  private-key-path: ${JWT_PRIVATE_KEY_PATH:keys/private.pem}
  public-key-path:  ${JWT_PUBLIC_KEY_PATH:keys/public.pem}
  expiration-ms:    ${JWT_EXPIRATION_MS:3600000}   # 1 hour
  issuer:           ${JWT_ISSUER:identity-service}
  key-id:           ${JWT_KID:demo-key-1}

# ── Kafka topics ────────────────────────────────────────────────────────────
kafka:
  topics:
    user-created: user-created
