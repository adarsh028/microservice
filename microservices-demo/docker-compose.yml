# =============================================================================
#  docker-compose.yml
#  Microservices Demo – full stack
#
#  Services
#  ────────
#  Infrastructure:
#    zookeeper       – Kafka coordination
#    kafka           – Message broker
#    postgres        – Single PostgreSQL instance hosting 3 databases
#    init-db         – One-shot container that creates the 3 databases
#
#  Applications:
#    identity-service     – Port 8081  (Auth + JWKS)
#    profile-service      – Port 8082 (HTTP) + 9090 (gRPC)
#    notification-service – Port 8083
#
#  Networks
#  ────────
#    backend  – internal; all services communicate here
# =============================================================================

# ── Shared environment fragments ──────────────────────────────────────────────
x-db-env: &db-env
  DB_USER: postgres
  DB_PASS: postgres

x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP: kafka:29092

x-jwks-env: &jwks-env
  JWKS_URI: http://identity-service:8081/.well-known/jwks.json

# =============================================================================
services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Internal listener for container-to-container comms
      # External listener for host-machine tooling (e.g. kafka-console-consumer)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"   # host access for debugging
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres        # default database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── DB initialiser (one-shot) ──────────────────────────────────────────────
  # Creates identity_db, profile_db, notification_db if they don't exist.
  init-db:
    image: postgres:16-alpine
    container_name: init-db
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command: >
      sh -c "
        psql -h postgres -U postgres -c 'CREATE DATABASE identity_db' 2>/dev/null || true;
        psql -h postgres -U postgres -c 'CREATE DATABASE profile_db' 2>/dev/null || true;
        psql -h postgres -U postgres -c 'CREATE DATABASE notification_db' 2>/dev/null || true;
        echo 'Databases ready.'
      "
    networks:
      - backend
    restart: "no"

  # ── Identity Service ───────────────────────────────────────────────────────
  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
      network: host
    container_name: identity-service
    depends_on:
      init-db:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      <<: [*db-env, *kafka-env]
      DB_HOST: postgres
      SERVER_PORT: 8081
      JWT_EXPIRATION_MS: 3600000
      JWT_ISSUER: identity-service
      JWT_KID: demo-key-1
      # RSA keys are generated at first boot and written to this volume
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH:  /app/keys/public.pem
    ports:
      - "8081:8081"
    volumes:
      - identity_keys:/app/keys
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Profile Service ────────────────────────────────────────────────────────
  profile-service:
    build:
      context: .                              # repo root – gives access to proto/
      dockerfile: profile-service/Dockerfile
      network: host
    container_name: profile-service
    depends_on:
      init-db:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    environment:
      <<: [*db-env, *kafka-env, *jwks-env]
      DB_HOST: postgres
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
      - "9090:9090"   # gRPC port
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Notification Service ───────────────────────────────────────────────────
  notification-service:
    build:
      context: .                              # repo root – gives access to proto/
      dockerfile: notification-service/Dockerfile
      network: host
    container_name: notification-service
    depends_on:
      init-db:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      profile-service:
        condition: service_healthy
    environment:
      <<: [*db-env, *kafka-env, *jwks-env]
      DB_HOST: postgres
      SERVER_PORT: 8083
      PROFILE_GRPC_ADDRESS: static://profile-service:9090
    ports:
      - "8083:8083"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

# =============================================================================
networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  identity_keys:    # persists RSA keys across container restarts
